services:
  - type: web
    name: sonia-video-bd-site
    env: static
    buildCommand: ""
    staticPublishPath: .
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: require-corp
      - path: /*
        name: Cross-Origin-Resource-Policy
        value: cross-origin
